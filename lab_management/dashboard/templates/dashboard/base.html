<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Omnia Cluster Dashboard{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(0, 24, 72, 0.75) 0%, rgba(0, 48, 96, 0.65) 100%), url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgb(0,24,72);stop-opacity:0.7" /><stop offset="100%" style="stop-color:rgb(0,48,96);stop-opacity:0.55" /></linearGradient></defs><rect width="1200" height="800" fill="url(%23grad)"/><circle cx="200" cy="200" r="100" fill="rgba(255,255,255,0.05)"/><circle cx="1000" cy="600" r="150" fill="rgba(255,255,255,0.03)"/><circle cx="600" cy="400" r="80" fill="rgba(255,255,255,0.04)"/></svg>');
            background-size: cover;
            min-height: 100vh;
            color: #ffffff;
            scroll-behavior: smooth;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 50px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: #ffffff;
            font-size: 2.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: #1976d2;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #1976d2;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section-title {
            font-size: 1.8em;
            color: #1976d2;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #3498db;
        }

        .table-container {
            overflow-x: auto;
            margin: 20px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.14);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 36px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(16px);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        th {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background: #e3f2fd;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-inactive {
            background: #ffffff;
            color: #3498db;
            border: 1px solid #3498db;
        }

        .incident-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .incident-critical {
            background: #bbdefb;
            color: #1565c0;
        }

        .incident-high {
            background: #e3f2fd;
            color: #1976d2;
        }

        .incident-medium {
            background: #ffffff;
            color: #3498db;
            border: 1px solid #3498db;
        }

        .incident-low {
            background: #f5f5f5;
            color: #42a5f5;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2980b9, #21618c);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
            color: white;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #1e88e5, #1976d2);
            transform: translateY(-2px);
        }

        .cluster-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #3498db;
        }

        .cluster-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .cluster-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #1976d2;
        }

        .cluster-owner {
            color: #3498db;
            font-size: 0.9em;
        }

        .cluster-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .cluster-stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 5px solid;
        }

        .alert-success {
            background: rgba(255, 255, 255, 0.12);
            color: #e3f2fd;
            border-color: rgba(66, 165, 245, 0.6);
            backdrop-filter: blur(14px);
        }

        .alert-error {
            background: rgba(255, 255, 255, 0.12);
            color: #ffb3b3;
            border-color: rgba(244, 67, 54, 0.6);
            backdrop-filter: blur(14px);
        }

        .alert-info {
            background: rgba(255, 255, 255, 0.12);
            color: #e3f2fd;
            border-color: rgba(52, 152, 219, 0.6);
            backdrop-filter: blur(14px);
        }

        .upload-area-simple {
            border: 1px solid rgba(52, 152, 219, 0.4);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            margin-bottom: 20px;
            backdrop-filter: blur(14px);
            box-shadow: 0 10px 36px rgba(0, 0, 0, 0.25);
            color: #e3f2fd;
        }

        .upload-area-simple:hover {
            border-color: #1976d2;
            background: #e3f2fd;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .cluster-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .cluster-stats {
                flex-direction: column;
                gap: 10px;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }
        }

        /* New Cluster Box Styles */
        .cluster-categories {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 50px;
        }

        .cluster-box {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 44px 34px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.32);
            box-shadow: 0 12px 42px rgba(0, 0, 0, 0.32);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #ffffff;
            min-height: 230px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cluster-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 54px rgba(0, 0, 0, 0.38);
            border-color: rgba(255, 255, 255, 0.42);
        }

        .cluster-box-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.95;
        }

        .cluster-box-title {
            font-size: 1.9em;
            font-weight: 800;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .cluster-box-count {
            font-size: 1.15em;
            opacity: 0.9;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .cluster-box-description {
            font-size: 0.95em;
            opacity: 0.9;
            line-height: 1.5;
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .cluster-categories {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .cluster-box {
                padding: 30px 20px;
                min-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                Omnia Cluster Dashboard
            </h1>
        </header>

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
